<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Notes</title>
    </head>

    <body>
        <h2>Notes</h2>

        <h3>Welcome back: {{ user }}!</h3>
        <form method="post">
            <input type="text" name="title" placeholder="Write down the title..." required><br>
            <textarea name="content" id="notes" cols="50" rows="10" placeholder="Write down your notes..."></textarea><br>
            <button type="submit">Add note</button>
        </form>

        <h3>Your notes:</h3>
        <ul>
        {% for note in notes %}
            <li>{{ note.title }}</li>
        {% endfor %}
        </ul>
    </body>

</html>
